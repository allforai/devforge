# App Factory 配置文件
# Keys 从 .env 加载，不要在这里写密钥
#
# provider: google | openrouter | mock
# 环境变量: GEMINI_API_KEY, OPENROUTER_API_KEY, BRAVE_API_KEY

allow_live: true
provider: google

# 默认模型
model: gemini-3.1-pro-preview

# 按任务指定模型
tasks:
  concept_collection:
    model: gemini-3.1-pro-preview
  product_design:
    model: gemini-3.1-pro-preview
  design_validation:
    model: gemini-3-flash-preview
  acceptance_evaluation:
    model: gemini-3.1-pro-preview
  planning_and_shaping:
    model: gemini-3-flash-preview
  retry_decision:
    model: gemini-3-flash-preview

# XV 多模型交叉验证
xv:
  architecture_review:
    provider: openrouter
    model: openai/gpt-5.4
  data_model_review:
    provider: openrouter
    model: deepseek/deepseek-v3.2
  ui_review:
    provider: google
    model: gemini-3.1-pro-preview
  security_review:
    provider: openrouter
    model: openai/gpt-5.4
  code_review:
    provider: openrouter
    model: anthropic/claude-opus-4.6

# 工具配置
tools:
  brave_search:
    enabled: true
  image_generation:
    provider: google
    model: gemini-3.1-flash-image-preview
  demo_data:
    provider: google
    model: gemini-3-flash-preview
